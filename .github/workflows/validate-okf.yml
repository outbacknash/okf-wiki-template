name: Validate OKF Structure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - run: npm install
      - name: Test the validator (regression suite)
        run: npm test
      - name: Validate OKF conformance (fails on errors)
        run: npm run validate
      - name: Surface house-style warnings (non-blocking)
        run: npm run validate:strict || true
